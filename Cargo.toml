[package]
name = "ratatuefi"
version = "0.1.0"
edition = "2024"

[dependencies]
log = "0.4"
ratatui = {
  version = "0.30",
  default-features = false,
}
thiserror = { version = "2", default-features = false }
uefi = {
  version = "0.38",
  features = ["alloc", "global_allocator", "logger", "panic_handler", "qemu"]
}
